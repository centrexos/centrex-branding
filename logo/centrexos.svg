<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#2ac3de"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#7aa2f7"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#grad-blue)" stroke-width="12"/>

  <!-- Inner hexagon / C shape -->
  <path d="
    M 256 80
    L 380 148
    L 380 284
    C 380 320 350 348 312 360
    L 256 378
    L 200 360
    C 162 348 132 320 132 284
    L 132 148
    Z
  " fill="none" stroke="url(#grad-purple)" stroke-width="14" stroke-linejoin="round"/>

  <!-- Centre C letterform -->
  <path d="
    M 310 175
    A 80 80 0 1 0 310 335
  " fill="none" stroke="url(#grad-blue)" stroke-width="28" stroke-linecap="round"/>

  <!-- Bottom wordmark: CentrexOS -->
  <text
    x="256" y="470"
    font-family="'Noto Sans', 'DejaVu Sans', sans-serif"
    font-size="40"
    font-weight="700"
    text-anchor="middle"
    fill="#c0caf5"
    letter-spacing="4">CentrexOS</text>
</svg>
